<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravindra Rajak | Internship Task 2</title>
    <style>
        /* Glassmorphism Dark Theme */
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Responsive Layout using Grid [Source 87] */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { color: var(--secondary); margin-top: 0; font-weight: 300; letter-spacing: 1px; }

        /* Form Inputs [Source 83] */
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* To-Do List Styling [Source 90] */
        #todo-list { list-style: none; padding: 0; margin-top: 20px; }
        .todo-item {
            background: rgba(255, 255, 255, 0.05);
            margin: 8px 0;
            padding: 12px 18px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }

        .delete-btn { color: #ff7675; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 40px; font-weight: 200;">Web Development <span style="color: var(--secondary);">Task 2</span></h1>

    <div class="container">
        <div class="card">
            <h2>Send a Message</h2>
            <form id="contactForm">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <button type="submit" class="btn">Send Successfully</button>
            </form>
        </div>

        <div class="card">
            <h2>Add Internship Task</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="taskInput" placeholder="Enter task name..." style="margin: 0;">
                <button id="addTaskBtn" class="btn" style="width: auto; margin-top: 0; padding: 0 25px;">Add</button>
            </div>
            <ul id="todo-list">
                </ul>
        </div>
    </div>

    <script>
        /* Form Validation & Alert [Source 84, 86] */
        const contactForm = document.getElementById('contactForm');

        contactForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(email)) {
                alert("❌ Error: Please enter a valid email format (e.g., name@domain.com).");
            } else {
                alert("✅ Success! Your message has been sent successfully.");
                contactForm.reset();
            }
        });

        /* DOM Manipulation - Add/Remove Task [Source 91, 92] */
        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const todoList = document.getElementById('todo-list');

        addTaskBtn.addEventListener('click', () => {
            const taskValue = taskInput.value.trim();
            
            if (taskValue === "") {
                alert("Please type a task before adding.");
                return;
            }

            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <span>${taskValue}</span>
                <span class="delete-btn" title="Remove Task">Delete</span>
            `;

            li.querySelector('.delete-btn').addEventListener('click', () => {
                li.remove();
            });

            todoList.appendChild(li);
            taskInput.value = "";
        });
    </script>
</body>
</html>
